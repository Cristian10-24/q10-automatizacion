name: Q10 Auto

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npm list googleapis  # 🔥 DEBUG (puedes quitar luego)

      - run: node index.js
        env:
          Q10_USER: ${{ secrets.Q10_USER }}
          Q10_PASS: ${{ secrets.Q10_PASS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}